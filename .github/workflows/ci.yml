name: CI

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify
        run: npm run verify
      - name: Eve session smoke
        run: |
          if [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            npm run test:eve
          else
            echo "::notice::Skipping Eve session smoke because this runner has no writable /dev/kvm"
          fi
      - name: Web smoke
        run: npm run test:web
